<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>The Forexecutioner</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Forexecutioner">
<meta name="theme-color" content="#17151A">
<style>
:root{
  --bg:#17151A; --surface:#201D24; --surface2:#2A2630; --line:#3A3542;
  --ink:#EDE6DA; --muted:#8E8797; --crimson:#C22A3A; --crimsondim:#7E1F2B;
  --gold:#D9A441; --green:#5FA36A; --greendim:#27402C;
  --display:'Futura-CondensedExtraBold','HelveticaNeue-CondensedBold','Arial Narrow',system-ui,sans-serif;
  --body:-apple-system,'SF Pro Text','Helvetica Neue',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--body);overscroll-behavior-y:none}
h1,h2,h3,.disp{font-family:var(--display);letter-spacing:1px;text-transform:uppercase;font-weight:800;margin:0}
#header{position:sticky;top:0;z-index:40;background:linear-gradient(var(--bg) 78%,transparent);padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;cursor:pointer}
.hrow{display:flex;justify-content:space-between;align-items:baseline;max-width:480px;margin:0 auto}
.brand{font-family:var(--display);font-size:20px;color:var(--crimson);letter-spacing:1px;text-transform:uppercase}
.rank{color:var(--gold);font-size:12px;font-family:var(--display);letter-spacing:1.5px;text-transform:uppercase}
.xpnum{font-family:var(--display);font-size:22px;text-align:right}
.xpnum small{font-size:12px;color:var(--muted)}
.streak{color:var(--muted);font-size:11px;text-align:right}
.bar{max-width:480px;margin:8px auto 0}
.track{height:5px;border-radius:3px;background:var(--surface2);overflow:hidden}
.fill{height:100%;background:var(--gold);border-radius:3px;transition:width .3s}
.tonext{color:var(--muted);font-size:10px;margin-top:3px;text-align:right}
#app{max-width:480px;margin:0 auto;padding:6px 16px 120px}
.label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;font-weight:600}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.cardtitle{font-family:var(--display);font-size:17px;letter-spacing:1px;text-transform:uppercase}
.sub{color:var(--muted);font-size:12px;margin:2px 0 9px}
input[type=text],textarea{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:11px 12px;font-size:16px;font-family:var(--body);outline:none;margin-bottom:8px;-webkit-appearance:none}
input::placeholder{color:var(--muted);opacity:.7}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 12px;border-radius:20px;font-size:13px;border:1px solid var(--line);color:var(--muted);cursor:pointer;user-select:none}
.chip.on{border-color:var(--crimson);background:var(--crimsondim);color:var(--ink)}
.chip.on.ok{border-color:var(--green);background:var(--greendim)}
.scale{display:flex;gap:5px;flex-wrap:wrap}
.scale div{width:30px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:15px;cursor:pointer;border:1px solid var(--line);color:var(--muted)}
.scale div.on{border-color:var(--crimson);background:var(--crimsondim);color:var(--ink)}
.cta{width:100%;margin-top:16px;padding:15px;border-radius:12px;border:none;cursor:pointer;background:var(--crimson);color:#fff;font-family:var(--display);font-size:18px;letter-spacing:2px;text-transform:uppercase}
.cta.done{background:var(--surface2);color:var(--muted)}
.cta.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:14px;padding:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tally{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 12px;cursor:pointer;user-select:none;transition:transform .06s}
.tally:active{transform:scale(.96)}
.trow{display:flex;justify-content:space-between;align-items:baseline}
.tname{font-family:var(--display);font-size:16px;letter-spacing:1px;text-transform:uppercase}
.tcount{font-family:var(--display);font-size:26px}
.thint{color:var(--muted);font-size:11px;margin-top:2px}
.meter{display:flex;gap:4px;margin-top:8px}
.meter div{flex:1;height:10px;border-radius:4px;background:var(--surface2);border:1px solid var(--line)}
.meter div.on{background:var(--crimson)}
.steprow{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
.steprow:last-child{border-bottom:none}
.stepmark{font-family:var(--display);font-size:18px;width:34px;text-align:center}
.sinrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0}
.yn{display:flex;gap:6px}
.qrow{display:flex;align-items:center;gap:10px;padding:9px 0;cursor:pointer;border-bottom:1px solid var(--line)}
.qrow:last-child{border-bottom:none}
.qbox{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--green);font-size:16px;flex:none}
.qbox.on{border-color:var(--green);background:var(--greendim)}
#tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);z-index:50}
#tabbar .inner{display:flex;max-width:480px;margin:0 auto}
#tabbar .tab{flex:1;text-align:center;padding:14px 0 12px;cursor:pointer;font-family:var(--display);font-size:14px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);border-top:2px solid transparent}
#tabbar .tab.on{color:var(--crimson);border-top-color:var(--crimson)}
#floats{position:fixed;bottom:130px;left:0;right:0;pointer-events:none;text-align:center;z-index:55}
.float{display:inline-block;margin:0 4px;color:var(--gold);font-family:var(--display);font-size:22px;animation:fxfloat .9s ease-out forwards}
@keyframes fxfloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-46px)}}
#toast{position:fixed;bottom:92px;left:16px;right:16px;z-index:56;display:flex;justify-content:center;pointer-events:none}
#toast div{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:10px 16px;font-size:13px;max-width:420px}
#modal{position:fixed;inset:0;background:rgba(15,13,17,.94);z-index:60;overflow-y:auto;padding:calc(env(safe-area-inset-top) + 24px) 18px 40px;display:none}
#modal .inner{max-width:480px;margin:0 auto}
.rrow{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}
.cal div{aspect-ratio:1;border-radius:8px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}
.cal div.closed{background:var(--crimsondim);border-color:var(--crimson);color:var(--ink)}
.cal div.today{border-color:var(--gold)}
.cal div.head{background:transparent;border:none;font-size:9px}
.statline{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line)}
.statline:last-child{border-bottom:none}
svg text{font-family:var(--body)}
details{margin-top:10px}
summary{color:var(--muted);font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="header" onclick="openRules()"></div>
<div id="app"></div>
<div id="floats"></div>
<div id="toast"></div>
<div id="modal" onclick="closeRules(event)"><div class="inner" id="modalinner" onclick="event.stopPropagation()"></div></div>
<div id="tabbar"><div class="inner" id="tabinner"></div></div>

<script>
"use strict";
// ================= CONSTANTS =================
const RANKS=[["Squire of the Spread",0],["Apprentice Headsman",500],["Pin Puller",1500],["Monster Hunter",3000],["Vampire Slayer",5000],["Grinder of Souls",8000],["The Executioner's Hand",12000],["THE FOREXECUTIONER",20000]];
const TALLIES=[
 {key:"dials",label:"Dial",xp:1,hint:"every swing counts"},
 {key:"dm",label:"DM Convo",xp:10,hint:"decision maker reached"},
 {key:"pitch",label:"30-Sec Pitch",xp:10,hint:"3 problems, no begging"},
 {key:"grinder",label:"Emotional Grinder",xp:15,hint:"sat in their pain"},
 {key:"pin",label:"Pulled the Pin",xp:15,hint:"clean disqualify. a win."},
 {key:"meeting",label:"Meeting (no beg)",xp:20,hint:"booked via process"}];
const STEPS=["Pattern interrupt","30-second pitch","Push-away #1","Is it important?","Push-away #2","Emotional grinder","Crabwalk check","Conversational questioning","Vampire invite","Last chance to bail","Ask for a referral"];
const STEP_MARKS=["\u2014","\u2717","~","\u2713"];
const STEP_COLORS=["var(--muted)","var(--crimson)","var(--gold)","var(--green)"];
const MEETING_STEPS=["Omega (set the frame)","Mock presentation","Future state","Pain discovery questions","The five pointers","Selling the proposal","The 3.5 alternatives","Next steps","Pulling the pin","Ending the meeting"];
const STEP_HINTS=["Break the script running in their head. Not 'how are you today'.","Three problems you fix, fast. Make them recognise themselves.","Hand them the exit. Takes the pressure off and makes them lean in.","Ask if the problem even matters to them. Let them qualify or drop out.","Push away again. Lean in twice and they are worth your time.","Make the cost of the problem concrete. Feeling, not a spec sheet.","Did you dodge sideways to avoid a hard question? Ask it straight.","Real curiosity, not an interrogation. A conversation.","Invite them to the next step. They have to want in.","One more exit before booking. Only the willing survive it.","Isn't there anyone you know as lucky or unlucky as you who doesn't have an incredible trader? Someone great, maybe a competitor of yours?"];
const MEETING_HINTS=["Set the frame up front. This is how the meeting will run.","Show them the shape of a solution without pitching yet.","Paint where they could be, against where they are now.","Dig for the real pain, in their own words.","Walk the five qualification gates below.","Let the proposal sell off their pain, not your features.","Frame their options honestly, including doing nothing.","Nail concrete next steps before anyone leaves.","Be willing to disqualify. Pull the pin if it isn't real.","Close cleanly. No begging, no chasing."];
const POINTERS=["Problems we fix","They accept it's a problem","They convinced ME","Can afford it","How they decide"];
const CALL_TYPES=["Cold call","Sales meeting","Referral / inbound","Follow-up"];
const stepsFor=type=>type==="Sales meeting"?MEETING_STEPS:STEPS;
const BOSSES=["Loyalty Wraith","Priority Phantom","Price Ogre","Document Dodger","The Ghost"];
const DRIVERS=["Hurry Up","Be Perfect","Please Me","Try Hard","Be Strong"];
const CARD_DRIVERS=[...DRIVERS,"Natural Child","Nurturing Parent","Adult"];
const NC_STATES=["Relaxed","Comfortable","Alert","Eager","Energized","Excited","Powerful"];
const PERMISSIONS=["take my time","make mistakes","rely on myself","finish + succeed","feel + be open"];
const DRIVER_NOTES={"Hurry Up":"racing the pitch, talking over silence \u2192 permission to take your time","Be Perfect":"script paralysis, avoiding dials \u2192 permission to make mistakes","Please Me":"THE BEGGING + CRABWALK ENGINE \u2192 permission to rely on yourself","Try Hard":"grinding with no closes \u2192 permission to finish and succeed","Be Strong":"armor up, zero curiosity \u2192 permission to feel and be open","Natural Child":"authentic, curious, playful. your pattern interrupt and real enthusiasm live here","Nurturing Parent":"genuinely helping without needing them to like you. care, not begging","Adult":"facts, questions, disqualifying. here and now, no old tape running"};
const DRIVER_GUIDE={"Hurry Up":{cmd:"Go faster, don't waste time",dial:"racing the pitch, talking over the silence",perm:"take my time"},"Be Perfect":{cmd:"Don't screw up, get it exactly right",dial:"I'll fumble the script and sound stupid",perm:"make mistakes"},"Please Me":{cmd:"Don't be a bother, keep them happy, be liked",dial:"I'll annoy them, I'm interrupting, they'll think I'm a nuisance",perm:"rely on myself"},"Try Hard":{cmd:"Effort is what matters, straining is virtue",dial:"grinding hard, never actually closing",perm:"finish + succeed"},"Be Strong":{cmd:"Don't show anything, armor up",dial:"zero curiosity, robotic, no feeling",perm:"feel + be open"}};
const DEFAULT_SCRIPT=[
"Honest, permission-based opener. Name the cold call, ask for 30 seconds.\ne.g. You don't know me and this is a cold call. Give me 30 seconds and then throw me off the phone?",
"About THEM, in their shoes. Three problems, each as: they're [feeling] because [problem we solve].\n1. they're [frustrated / anxious / annoyed] because [problem 1]\n2. they're [feeling] because [problem 2]\n3. they're [feeling] because [problem 3]\n\nRaw material to convert:\n- save up to 4% on currency exchange (FOMO they don't even know they have)\n- when the market moves in their favour, timely calls from a trader save even more\n- a currency strategy could save tens of thousands",
"But I bet you're going to tell me you don't deal with any currency exchange, or you don't import or export, or you handle FX yourself and don't think anyone could do it better.",
"Yes or no.\nIf yes: of those, which one, if you could solve it, would you want solved?\nIs it important to you?",
"Look, I've taken more than my 30 seconds. Is it okay if we keep talking for another minute?",
"They've said it's important. Now grind:\n- Did you know it was an issue?\n- How long have you known?\n- Was it an issue last year?\n- If you do nothing, will it be an issue next year?\n- So it's probably an issue this year too?\nPast / present / future cost x3 (via rate comparison) = the $30-50k they could add straight to their bottom line.",
"Self-check: am I going sideways to dodge the hard question? Stop. Ask it straight.",
"Real curiosity, not an interrogation. Ask questions that show you know their world better than they do. Build these in the Objections tab.",
"Invite them to the next step. They have to want in. Don't drag them.",
"Give them one more out before booking. Only the willing survive it.",
"Isn't there anyone you know as lucky or unlucky as you who doesn't have an incredible trader? Someone great, maybe a competitor of yours?"];
const DEFAULT_QUESTIONS=[
{trigger:"How do you make your money?",response:""},
{trigger:"Is it safe? Are you insured / regulated?",response:""},
{trigger:"How come I've never heard of you?",response:""},
{trigger:"What strategies do you use to save clients money?",response:""},
{trigger:"What documents / information will I need to provide?",response:""},
{trigger:"What are the typical hiccups that happen?",response:""},
{trigger:"Timelines? Delays on first payments and debits?",response:""},
{trigger:"Is it easy?",response:""}];
const DEFAULT_OBJECTIONS=[
{trigger:"We already got a guy",response:""},
{trigger:"We do that in house",response:""},
{trigger:"I tried that before and it didn't work",response:""},
{trigger:"Our bank gives us a preferred rate",response:""},
{trigger:"No one knows what's going to happen in the market",response:""},
{trigger:"We've been doing it this way for years",response:""},
{trigger:"Call me in 6 months",response:""},
{trigger:"Just send me an email",response:""},
{trigger:"I'm not interested",response:""},
{trigger:"Now's not a good time, I'm busy",response:""},
{trigger:"I need to think about it",response:""},
{trigger:"I have to run it by my partner / boss / the board",response:""},
{trigger:"We're happy with our current setup",response:""},
{trigger:"We don't do enough volume to matter",response:""},
{trigger:"We're locked into a contract",response:""},
{trigger:"Take me off your list",response:""}];

// ================= STATE =================
const todayKey=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const emptyDay=()=>({dawn:{gratitudes:["","",""],thought:"",driver:null,justif:"",martian:"",permission:null,ncStates:[],quests:["","",""],firstDial:"",complete:false},
 tallies:{dials:0,dm:0,pitch:0,grinder:0,pin:0,meeting:0,nos:0,noBonuses:0},cards:[],
 dusk:{questsDone:[false,false,false],behaviourRank:0,feel:0,cycle:null,cycleBroke:false,hungryFor:"",reclaim:"",correlation:"",closed:false,lowDay:false}});
const emptyCard=()=>({type:"Cold call",company:"",steps:Array(11).fill(0),pointers:[],enthusiasm:0,sins:{crabwalk:null,begged:null,iFocused:null},boss:null,bossResult:null,driver:null,bait:"",ben:"",fact:"",oneThing:"",time:""});

function load(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){toast("Storage error. Export your data.");}}

let meta=load("fx-meta",{bankedXP:0,streak:0,lastClosed:null});
let day=Object.assign(emptyDay(),load("fx-day-"+todayKey(),{}));
// deep-merge safety for older shapes
day.dawn=Object.assign(emptyDay().dawn,day.dawn||{});
day.tallies=Object.assign(emptyDay().tallies,day.tallies||{});
day.dusk=Object.assign(emptyDay().dusk,day.dusk||{});
day.cards=day.cards||[];
let card=load("fx-carddraft",emptyCard());
let tab=load("fx-tab","hunt");
let script=load("fx-script",DEFAULT_SCRIPT.slice());
let objections=load("fx-objections",null);
let questions=load("fx-questions",null);
// migration: v1.2.6 seeded client-questions into fx-objections; relocate them to fx-questions
if(questions===null&&objections&&objections[0]&&objections[0].trigger==="How do you make your money?"){questions=objections;objections=null;save("fx-questions",questions);}
if(objections===null){objections=DEFAULT_OBJECTIONS.map(o=>({...o}));save("fx-objections",objections);}
if(questions===null){questions=DEFAULT_QUESTIONS.map(o=>({...o}));save("fx-questions",questions);}
let huntView="tallies";

const persistDay=()=>save("fx-day-"+todayKey(),day);
const persistCard=()=>save("fx-carddraft",card);
const persistScript=()=>save("fx-script",script);
const persistObjections=()=>save("fx-objections",objections);
const persistQuestions=()=>save("fx-questions",questions);

// ================= XP ENGINE =================
function dayXP(d){
 const t=d.tallies;
 let xp=t.dials*1+t.dm*10+t.pitch*10+t.grinder*15+t.pin*15+t.meeting*20+t.nos*1+t.noBonuses*30;
 if(d.dawn.complete)xp+=10;
 const qd=d.dusk.questsDone.filter(Boolean).length;
 xp+=qd*15; if(qd===3)xp+=25;
 for(const c of d.cards){xp+=5; if(c.bossResult==="grinded")xp+=20; if(c.steps.filter(s=>s>0).length===10)xp+=25;}
 if(d.dusk.cycleBroke)xp+=20;
 return xp;
}
const rankFor=xp=>{let r=RANKS[0];for(const rk of RANKS)if(xp>=rk[1])r=rk;return r;};
const nextRank=xp=>RANKS.find(r=>r[1]>xp)||null;

// ================= HELPERS =================
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
let toastTimer=null;
function toast(msg){$("toast").innerHTML=`<div>${esc(msg)}</div>`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>$("toast").innerHTML="",2200);}
function floatXP(label){const el=document.createElement("div");el.className="float";el.textContent=label;$("floats").appendChild(el);setTimeout(()=>el.remove(),900);}
function buzz(){if(navigator.vibrate)navigator.vibrate(10);}

// ================= RENDER: HEADER + TABS =================
function renderHeader(){
 const live=day.dusk.closed?0:dayXP(day);
 const total=meta.bankedXP+live;
 const [rname,rbase]=rankFor(total);
 const nxt=nextRank(total);
 let bar="";
 if(nxt){const pct=Math.min(100,((total-rbase)/(nxt[1]-rbase))*100);
  bar=`<div class="bar"><div class="track"><div class="fill" style="width:${pct}%"></div></div><div class="tonext">${(nxt[1]-total).toLocaleString()} XP to ${esc(nxt[0])}</div></div>`;}
 $("header").innerHTML=`<div class="hrow"><div><div class="brand">The Forexecutioner</div><div class="rank">${esc(rname)}</div></div>
  <div><div class="xpnum">${total.toLocaleString()} <small>XP</small></div>
  <div class="streak">${meta.streak>0?`\uD83D\uDD25 ${meta.streak}-day streak`:"start a streak"}</div></div></div>${bar}`;
}
const TABS=[["dawn","Dawn"],["hunt","Hunt"],["card","Card"],["dusk","Dusk"],["hist","Ledger"]];
function renderTabs(){$("tabinner").innerHTML=TABS.map(([k,l])=>`<div class="tab ${tab===k?"on":""}" onclick="setTab('${k}')">${l}</div>`).join("");}
function setTab(k){tab=k;save("fx-tab",k);render();window.scrollTo(0,0);}

// ================= GENERIC UI BUILDERS =================
function chips(opts,current,handler,multi){
 return `<div class="chips">`+opts.map(o=>{
  const on=multi?(current||[]).includes(o):current===o;
  return `<div class="chip ${on?"on":""}" onclick="${handler}('${o.replace(/'/g,"\\'")}')" >${esc(o)}</div>`;}).join("")+`</div>`;
}
function scale(val,handler,max=10){
 let h=`<div class="scale">`;
 for(let n=1;n<=max;n++)h+=`<div class="${val>=n?"on":""}" onclick="${handler}(${n})">${n}</div>`;
 return h+`</div>`;
}
function ynRow(label,val,handler){
 return `<div class="sinrow"><div style="font-size:14px">${esc(label)}</div><div class="yn">
  <div class="chip ${val==="Y"?"on":""}" onclick="${handler}('Y')">Y</div>
  <div class="chip ${val==="N"?"on ok":""}" onclick="${handler}('N')">N</div></div></div>`;
}

// ================= DAWN =================
function renderDawn(){
 const dw=day.dawn;
 return `
 <div class="label">Three gratitudes — specific beats generic</div>
 ${dw.gratitudes.map((g,i)=>`<input type="text" placeholder="Gratitude ${i+1}" value="${esc(g)}" onchange="day.dawn.gratitudes[${i}]=this.value;persistDay()">`).join("")}

 <div class="card"><div class="cardtitle">The Tape Check</div>
  <div class="sub">Meininger's four elements plus the Martian reality check. Walk them top to bottom. Each rung sets up the next.</div>

  <div class="label">1. The tape, word for word</div>
  <div class="sub">Name the feeling first ("I don't want to dial"). Then finish it: "...because ____". That because-clause is the tape.</div>
  <input type="text" placeholder="...because I'll mess it up and look like a fool" value="${esc(dw.thought)}" onchange="day.dawn.thought=this.value;persistDay()">

  <div class="label">2. The driver pushing the tape</div>
  <div class="sub">Which of the 5 old commands makes you write a tape like that? Tap one, then read its tell.</div>
  ${chips(DRIVERS,dw.driver,"setDawnDriver")}
  ${dw.driver?`<div class="sub" style="margin-top:6px">${esc(DRIVER_NOTES[dw.driver]||"")}</div>`:""}

  <div class="label">3. The justifications it hides in</div>
  <div class="sub">The responsible-sounding excuses that happen to delay the dial. If it sounds smart and keeps you off the phone, it's a justification.</div>
  <input type="text" placeholder="not ready, need to practice, too tired, better list first..." value="${esc(dw.justif)}" onchange="day.dawn.justif=this.value;persistDay()">

  <div class="label">4. The Martian view</div>

function allDays(){

 }

function allCardsChrono(days){return days.flatMap(x=>(x.d.cards||[]).map(c=>({date:x.date,c})));}

function corrChart(days){
 const pts=days.filter(x=>x.d.dusk&&x.d.dusk.closed&&!x.d.dusk.lowDay&&x.d.dusk.behaviourRank>0&&x.d.dusk.feel>0).slice(-30);
 if(pts.length<2)return `<div class="sub">Close 2+ full days with behaviour + feel ranked and the correlation line appears here. This is Ben's experiment, made visible.</div>`;
 const W=440,H=170,P=26;
 const x=i=>P+i*(W-2*P)/(pts.length-1);
 const y=v=>H-P-(v-1)*(H-2*P)/9;
 const line=(get,color)=>`<polyline fill="none" stroke="${color}" stroke-width="2.5" points="${pts.map((p,i)=>`${x(i)},${y(get(p))}`).join(" ")}"/>`+
  pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(get(p))}" r="3.5" fill="${color}"/>`).join("");
 return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
  ${[1,5,10].map(v=>`<line x1="${P}" x2="${W-P}" y1="${y(v)}" y2="${y(v)}" stroke="var(--line)" stroke-width="1"/><text x="4" y="${y(v)+4}" font-size="10" fill="var(--muted)">${v}</text>`).join("")}
  ${line(p=>p.d.dusk.behaviourRank,"#C22A3A")}${line(p=>p.d.dusk.feel,"#D9A441")}
 </svg>
 <div style="font-size:11px;color:var(--muted)"><span style="color:#C22A3A">\u25CF</span> behaviour rank &nbsp; <span style="color:#D9A441">\u25CF</span> how I feel about myself \u2014 watch them move together.</div>`;
}

function masteryBlock(cards,stepNames){
 if(!cards.length)return `<div class="sub">File cards and this becomes your methodology mastery map: nailed-rate per step, with a trend arrow once you have 6+ cards.</div>`;
 const half=Math.floor(cards.length/2);
 const older=cards.slice(0,half),recent=cards.slice(half);
 const rate=(set,i)=>{const r=set.filter(c=>c.steps[i]>0);if(!r.length)return null;return r.filter(c=>c.steps[i]===3).length/r.length;};
 return stepNames.map((s,i)=>{
  const all=rate(cards,i);
  if(all===null)return `<div class="statline"><span style="color:var(--muted)">${i+1}. ${s}</span><span style="color:var(--muted)">not reached yet</span></div>`;
  let arrow="";
  if(cards.length>=6){
   const o=rate(older,i),r=rate(recent,i);
   if(o!==null&&r!==null){const d=r-o;arrow=d>0.05?`<span style="color:var(--green)"> \u2191</span>`:d<-0.05?`<span style="color:var(--crimson)"> \u2193</span>`:`<span style="color:var(--muted)"> \u2192</span>`;}
  }
  const pct=Math.round(all*100);
  return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${i+1}. ${s}</span><span>${pct}% nailed${arrow}</span></div>
   <div class="track" style="margin-top:3px"><div class="fill" style="width:${pct}%;background:${pct>=70?"var(--green)":pct>=40?"var(--gold)":"var(--crimson)"}"></div></div></div>`;
 }).join("");
}
function pointerStats(meetingCards){
 if(!meetingCards.length)return "";
 return `<div class="label">Five pointers — clear rate</div>`+POINTERS.map(p=>{
  const n=meetingCards.filter(c=>(c.pointers||[]).includes(p)).length;
  const pct=Math.round(100*n/meetingCards.length);
  return `<div style="margin-top:6px"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${p}</span><span style="color:var(--muted)">${pct}%</span></div>
   <div class="track" style="margin-top:2px"><div class="fill" style="width:${pct}%;background:${pct>=70?"var(--green)":"var(--gold)"}"></div></div></div>`;
 }).join("");
}

function sinsTrend(days){
 const cards=allCardsChrono(days).map(x=>x.c).filter(c=>c.sins&&(c.sins.crabwalk||c.sins.begged||c.sins.iFocused));
 if(cards.length<4)return "";
 const half=Math.floor(cards.length/2);
 const rate=set=>{const answered=set.filter(c=>c.sins.crabwalk||c.sins.begged||c.sins.iFocused);if(!answered.length)return 0;
  return answered.filter(c=>c.sins.crabwalk==="Y"||c.sins.begged==="Y"||c.sins.iFocused==="Y").length/answered.length;};
 const o=Math.round(rate(cards.slice(0,half))*100),r=Math.round(rate(cards.slice(half))*100);
 return `<div class="card"><div class="cardtitle">Sin Rate</div>
  <div class="sub">Calls with at least one sin (crabwalk / beg / "I"-focus). Down is growth.</div>
  <div style="display:flex;gap:20px;margin-top:10px;text-align:center">
   <div style="flex:1"><div style="font-family:var(--display);font-size:30px;color:var(--muted)">${o}%</div><div style="font-size:11px;color:var(--muted)">earlier cards</div></div>
   <div style="flex:1"><div style="font-family:var(--display);font-size:30px;color:${r<o?"var(--green)":r>o?"var(--crimson)":"var(--ink)"}">${r}%</div><div style="font-size:11px;color:var(--muted)">recent cards</div></div>
  </div></div>`;
}

function volumeChart(days){
 const byDate={};days.forEach(x=>byDate[x.date]=x.d);
 const series=[];
 for(let i=13;i>=0;i--){
  const dt=new Date();dt.setDate(dt.getDate()-i);
  const key=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
  const d=byDate[key];
  series.push({label:dt.getDate(),dials:d?d.tallies.dials:0,dm:d?d.tallies.dm:0});
 }
 const max=Math.max(1,...series.map(s=>s.dials));
 const W=440,H=140,P=18,bw=(W-2*P)/14;
 return `<svg viewBox="0 0 ${W} ${H}" style="width:100%">
  ${series.map((s,i)=>{
   const x=P+i*bw;
   const h1=s.dials/max*(H-2*P),h2=s.dm/max*(H-2*P);
   return `<rect x="${x+2}" y="${H-P-h1}" width="${bw-8}" height="${Math.max(h1,1)}" rx="3" fill="${s.dials?"#7E1F2B":"var(--surface2)"}"/>
    ${s.dm?`<rect x="${x+2}" y="${H-P-h2}" width="${bw-8}" height="${h2}" rx="3" fill="#D9A441"/>`:""}
    <text x="${x+bw/2-2}" y="${H-4}" font-size="9" fill="var(--muted)" text-anchor="middle">${s.label}</text>`;
  }).join("")}
 </svg>
 <div style="font-size:11px;color:var(--muted)"><span style="color:#7E1F2B">\u25A0</span> dials &nbsp; <span style="color:#D9A441">\u25A0</span> DM convos \u00B7 last 14 days</div>`;
}

function xpChart(days){
 const closed=days.filter(x=>x.d.dusk&&x.d.dusk.closed);
 if(closed.length<2)return "";
 let cum=0;const pts=closed.slice(-30).map(x=>{cum+=dayXP(x.d);return cum;});
 const W=440,H=120,P=16,max=Math.max(...pts);
 const x=i=>P+i*(W-2*P)/(pts.length-1);
 const y=v=>H-P-(v/max)*(H-2*P);
 return `<div class="card"><div class="cardtitle">XP Climb</div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;margin-top:8px">
   <polyline fill="none" stroke="var(--gold)" stroke-width="2.5" points="${pts.map((v,i)=>`${x(i)},${y(v)}`).join(" ")}"/>
   ${pts.map((v,i)=>`<circle cx="${x(i)}" cy="${y(v)}" r="3" fill="var(--gold)"/>`).join("")}
  </svg>
  <div style="font-size:11px;color:var(--muted)">cumulative XP across closed days \u2014 the only chart where down is impossible.</div></div>`;
}

function renderHist(){
 const days=allDays();
 const cardsAll=allCardsChrono(days).map(x=>x.c);
 const bossStats=BOSSES.map(b=>{const f=cardsAll.filter(c=>c.boss===b);const g=f.filter(c=>c.bossResult==="grinded").length;return{b,n:f.length,g};}).filter(s=>s.n>0).sort((a,b)=>b.n-a.n);
 const dcount={};
 cardsAll.forEach(c=>{if(c.driver&&DRIVERS.includes(c.driver))dcount[c.driver]=(dcount[c.driver]||0)+1;});
 days.forEach(x=>{if(x.d.dawn&&x.d.dawn.driver)dcount[x.d.dawn.driver]=(dcount[x.d.dawn.driver]||0)+1;});
 const dsorted=Object.entries(dcount).sort((a,b)=>b[1]-a[1]);
 const dmax=dsorted.length?dsorted[0][1]:1;
 const last7=days.slice(-7);
 const sum=k=>last7.reduce((a,x)=>a+((x.d.tallies||{})[k]||0),0);
 const closed7=last7.filter(x=>x.d.dusk&&x.d.dusk.closed);
 const avg=get=>{const v=closed7.map(get).filter(n=>n>0);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"-";};
 const cards7=last7.reduce((a,x)=>a+(x.d.cards||[]).length,0);
 const summaryText=`FOREXECUTIONER WEEK: ${sum("dials")} dials, ${sum("dm")} DM convos, ${sum("pitch")} pitches, ${sum("meeting")} meetings, ${sum("pin")} pins pulled, ${cards7} cards filed. Avg behaviour rank ${avg(x=>x.d.dusk.behaviourRank)}, avg feel ${avg(x=>x.d.dusk.feel)}. Top boss: ${bossStats[0]?bossStats[0].b:"none yet"}. Top driver: ${dsorted[0]?dsorted[0][0]:"none yet"}.`;
 const now=new Date();const yr=now.getFullYear(),mo=now.getMonth();
 const first=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();
 const dayMap={};days.forEach(x=>dayMap[x.date]=x.d);
 let cal=["S","M","T","W","T","F","S"].map(h=>`<div class="head">${h}</div>`).join("");
 for(let i=0;i<first;i++)cal+="<div style='visibility:hidden'></div>";
 for(let dd=1;dd<=dim;dd++){
  const key=`${yr}-${String(mo+1).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
  const has=!!dayMap[key];const closed=has&&dayMap[key].dusk&&dayMap[key].dusk.closed;
  cal+=`<div class="${closed?"closed":""} ${key===todayKey()?"today":""}" ${has?`style="cursor:pointer" onclick="openDay('${key}')"`:""}>${dd}</div>`;
 }
 const coldCards=cardsAll.filter(c=>c.type!=="Sales meeting");
 const meetCards=cardsAll.filter(c=>c.type==="Sales meeting");
 return `
 <div class="card"><div class="cardtitle">Cold Call Mastery</div>
  <div class="sub">Nailed-rate per step. This is the methodology, measured. Arrows compare recent cards to earlier ones.</div>
  ${masteryBlock(coldCards,STEPS)}</div>
 ${meetCards.length?`<div class="card"><div class="cardtitle">Meeting Mastery</div>
  <div class="sub">The meeting anatomy, measured the same way.</div>
  ${masteryBlock(meetCards,MEETING_STEPS)}
  ${pointerStats(meetCards)}</div>`:""}
 ${sinsTrend(days)}
 <div class="card"><div class="cardtitle">The Correlation</div>${corrChart(days)}</div>
 <div class="card"><div class="cardtitle">Volume</div>${volumeChart(days)}</div>
 ${xpChart(days)}
 <div class="card"><div class="cardtitle">Boss Ledger</div>
  ${bossStats.length?bossStats.map(s=>`<div class="statline"><span>${esc(s.b)}</span><span>${s.n} fights \u00B7 <span style="color:${s.g/s.n>=.5?"var(--green)":"var(--crimson)"}">${Math.round(100*s.g/s.n)}% grinded</span></span></div>`).join(""):`<div class="sub">File cards with boss fights and the ledger fills in.</div>`}
 </div>
 <div class="card"><div class="cardtitle">Driver Frequency</div>
  <div class="sub">The tape that shows up most is your training camp.</div>
  ${dsorted.length?dsorted.map(([d,n])=>`<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>${esc(d)}</span><span style="color:var(--muted)">${n}</span></div>
   <div class="track" style="margin-top:3px"><div class="fill" style="width:${Math.round(100*n/dmax)}%;background:var(--crimson)"></div></div>
   <div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(DRIVER_NOTES[d]||"")}</div></div>`).join(""):`<div class="sub" style="margin-top:8px">No drivers logged yet.</div>`}
 </div>
 <div class="card"><div class="cardtitle">This Month</div><div class="sub">Tap a day to read its full record.</div><div class="cal">${cal}</div></div>
 <div class="card"><div class="cardtitle">Weekly Review</div>
  <div id="weeksummary" style="font-size:13px;margin-top:8px;line-height:1.5">${esc(summaryText)}</div>
  <button class="cta ghost" onclick="copySummary()">Copy for Coaching Club</button>
 </div>
 <div class="card"><div class="cardtitle">Your Data</div>
  <button class="cta ghost" onclick="exportData()">Export everything (JSON)</button>
  <button class="cta ghost" onclick="document.getElementById('importfile').click()">Import from backup</button>
  <input type="file" id="importfile" accept=".json" style="display:none" onchange="importData(this)">
  <button class="cta ghost" id="resetbtn" style="color:var(--crimson);border-color:var(--crimsondim)" onclick="resetAll()">Erase all data (fresh start)</button>
  <div style="text-align:center;color:var(--muted);font-size:10px;margin-top:10px">Callecutioner v1.2.7</div>
 </div>`;
}

// ---- day reader ----
function openDay(key){
 const d=load("fx-day-"+key,null);
 if(!d)return;
 const dw=d.dawn||{},t=d.tallies||{},dk=d.dusk||{};
 const row=(l,v)=>v?`<div style="padding:4px 0;font-size:13px"><span style="color:var(--muted)">${l}:</span> ${esc(v)}</div>`:"";
 const marks=c=>(c.steps||[]).map(s=>STEP_MARKS[s]).join(" ");
 $("modalinner").innerHTML=`
  <h2 style="font-size:22px">${esc(key)}</h2>
  <div class="sub" style="margin-bottom:14px">${dk.closed?(dk.lowDay?"Closed \u00B7 low day. Showing up counted.":"Closed."):"Never closed."} Tap outside to exit.</div>
  <div class="card"><div class="label" style="margin-top:0">Dawn</div>
   ${(dw.gratitudes||[]).filter(Boolean).map(g=>`<div style="font-size:13px;padding:2px 0">\u2022 ${esc(g)}</div>`).join("")||`<div class="sub">No gratitudes logged.</div>`}
   ${row("Tape",dw.thought)}${row("Driver",dw.driver)}${row("Justifications",dw.justif)}${row("Martian view",dw.martian)}${row("Permission",dw.permission)}
   ${(dw.ncStates||[]).length?row("States",dw.ncStates.join(", ")):""}
   ${(dw.quests||[]).filter(Boolean).map((q,i)=>`<div style="font-size:13px;padding:2px 0;color:${(dk.questsDone||[])[i]?"var(--green)":"var(--ink)"}">${(dk.questsDone||[])[i]?"\u2713":"\u25CB"} ${esc(q)}</div>`).join("")}
  </div>
  <div class="card"><div class="label" style="margin-top:0">Hunt</div>
   <div style="font-size:13px">${t.dials||0} dials \u00B7 ${t.dm||0} DM convos \u00B7 ${t.pitch||0} pitches \u00B7 ${t.grinder||0} grinders \u00B7 ${t.pin||0} pins \u00B7 ${t.meeting||0} meetings \u00B7 ${t.nos||0} no's</div>
  </div>
  <div class="card"><div class="label" style="margin-top:0">Cards (${(d.cards||[]).length})</div>
   ${(d.cards||[]).map(c=>`<div style="padding:8px 0;border-bottom:1px solid var(--line)">
    <div style="font-size:13px"><span style="color:var(--ink)">${esc(c.time||"")}</span> ${esc(c.type||"Cold call")} \u00B7 ${esc(c.company||"call")} ${c.boss?`\u00B7 ${esc(c.boss)} (${esc(c.bossResult||"?")})`:""} ${c.driver?`\u00B7 hooked: ${esc(c.driver)}`:""}</div>
    ${(c.pointers||[]).length?`<div style="font-size:11px;color:var(--muted)">pointers cleared: ${c.pointers.map(esc).join(", ")}</div>`:""}
    <div style="font-family:var(--display);font-size:14px;letter-spacing:3px;color:var(--muted)">${marks(c)}</div>
    ${row("Bait",c.bait)}${row("Ben's line",c.ben)}${row("Martian fact",c.fact)}
    <div style="color:var(--gold);font-size:12px">\u2192 ${esc(c.oneThing||"")}</div></div>`).join("")||`<div class="sub">No cards this day.</div>`}
  </div>
  <div class="card"><div class="label" style="margin-top:0">Dusk</div>
   ${row("Behaviour rank",dk.behaviourRank||"")}${row("Feel",dk.feel||"")}
   ${dk.cycle?row("Powerless cycle",dk.cycle==="Y"?("yes"+(dk.cycleBroke?" \u2014 broke it in the moment":"")):"no"):""}
   ${row("Hungry for",dk.hungryFor)}${row("Power back",dk.reclaim)}${row("Correlation",dk.correlation)}
  </div>`;
 $("modal").style.display="block";
}

// ---- reset ----
let resetArmed=false;
function resetAll(){
 const btn=$("resetbtn");
 if(!resetArmed){resetArmed=true;btn.textContent="Tap again to erase EVERYTHING \u2014 export first";btn.style.color="#fff";btn.style.background="var(--crimson)";
  setTimeout(()=>{resetArmed=false;if($("resetbtn")){$("resetbtn").textContent="Erase all data (fresh start)";$("resetbtn").style.color="var(--crimson)";$("resetbtn").style.background="transparent";}},4000);return;}
 const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("fx-"))keys.push(k);}
 keys.forEach(k=>localStorage.removeItem(k));
 meta={bankedXP:0,streak:0,lastClosed:null};day=emptyDay();card=emptyCard();tab="hunt";resetArmed=false;
 toast("Clean slate. Day 1 starts now.");render();
}

function copySummary(){
 const el=$("weeksummary");const txt=el?el.textContent:"";
 if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast("Copied. Bring it to Ben."),()=>toast("Copy failed \u2014 long-press the text instead."));
 else toast("Long-press the text to copy.");
}
function exportData(){
 const data={};
 for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("fx-"))data[k]=localStorage.getItem(k);}
 const blob=new Blob([JSON.stringify(data,null,1)],{type:"application/json"});
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`forexecutioner-backup-${todayKey()}.json`;a.click();
 toast("Backup downloaded. Your data is never trapped.");
}
function importData(input){
 const f=input.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=()=>{try{
  const data=JSON.parse(r.result);
  Object.entries(data).forEach(([k,v])=>{if(k.startsWith("fx-"))localStorage.setItem(k,v);});
  meta=load("fx-meta",meta);day=Object.assign(emptyDay(),load("fx-day-"+todayKey(),{}));
  day.dawn=Object.assign(emptyDay().dawn,day.dawn||{});day.tallies=Object.assign(emptyDay().tallies,day.tallies||{});day.dusk=Object.assign(emptyDay().dusk,day.dusk||{});day.cards=day.cards||[];
  toast("Backup restored.");render();
 }catch(e){toast("That file didn't parse. Wrong backup?");}};
 r.readAsText(f);
}

// ================= RULES MODAL =================
function openRules(){
 const total=meta.bankedXP+(day.dusk.closed?0:dayXP(day));
 const [rname]=rankFor(total);
 $("modalinner").innerHTML=`
  <h2 style="font-size:24px">Rules of the Game</h2>
  <div class="sub" style="margin-bottom:16px">XP for behaviours. Never outcomes. Tap outside to close.</div>
  <div class="card"><div class="label" style="margin-top:0">Rank ladder</div>
   ${RANKS.map(([n,xp])=>`<div class="rrow" style="color:${n===rname?"var(--gold)":"var(--ink)"};font-weight:${n===rname?"700":"400"}"><span>${esc(n)}${n===rname?" \u2190 you":""}</span><span style="font-family:var(--display)">${xp.toLocaleString()}</span></div>`).join("")}
  </div>
  <div class="card"><div class="label" style="margin-top:0">XP legend</div>
   ${[["Dial",1],["DM conversation",10],["30-sec pitch",10],["Emotional grinder",15],["Pin pulled (clean disqualify)",15],["Meeting without begging",20],["Each NO",1],["10 NO's in a row",30],["Card filed",5],["Full gauntlet on a card",25],["Boss grinded",20],["Dawn Ritual",10],["Each quest done",15],["All 3 quests bonus",25],["Powerless cycle broken",20]].map(([l,x])=>`<div class="rrow"><span>${l}</span><span style="color:var(--crimson);font-family:var(--display)">+${x}</span></div>`).join("")}
  </div>
  <div class="card"><div class="label" style="margin-top:0">The five drivers + their permissions</div>
   ${DRIVERS.map(d=>`<div style="padding:6px 0"><span style="color:var(--crimson);font-family:var(--display);letter-spacing:1px">${d}</span><div style="color:var(--muted);font-size:12px">${DRIVER_NOTES[d]}</div></div>`).join("")}
  </div>
  <div style="color:var(--muted);font-size:12px;font-style:italic;text-align:center;margin-top:10px">You can fail in your roles. You can never fail at being you.</div>`;
 $("modal").style.display="block";
}
function closeRules(e){$("modal").style.display="none";}

// ================= ROOT RENDER =================
function render(){
 renderHeader();renderTabs();
 $("app").innerHTML=tab==="dawn"?renderDawn():tab==="hunt"?renderHunt():tab==="card"?renderCard():tab==="dusk"?renderDusk():renderHist();
}
render();
if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
</body>
</html>
